name: Build dev and publish main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build static site
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.PAGES_API_BASE_URL }}

      - name: Disable Jekyll
        run: |
          touch dist-web/.nojekyll
          mkdir -p dist-web/.github/workflows
          cp .github/workflows/deploy-pages.yml dist-web/.github/workflows/deploy-pages.yml

      - name: Publish dist-web to main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./dist-web
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
